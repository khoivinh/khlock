    <!-- Cookie consent (Silktide) — must load before Google Analytics so the
         `gtag('consent', 'default', ...)` block below is honored from the very
         first request. Same pattern used by getbumpr.com. -->
    <link rel="stylesheet" href="/silktide-consent-manager.css">
    <script src="/silktide-consent-manager.js"></script>
    <script>
      window.silktideConsentManager.init({
        consentTypes: [
          {
            id: 'necessary',
            label: 'Necessary',
            description: 'Required for the site to work correctly.',
            required: true
          },
          {
            id: 'analytics',
            label: 'Analytics',
            description: 'Helps us understand how visitors use the site. We use Google Analytics.',
            gtag: 'analytics_storage'
          }
        ],
        text: {
          prompt: {
            acceptAllButtonText: 'Accept all',
            rejectNonEssentialButtonText: 'Essential Only'
          }
        }
      });
    </script>

    <!-- Google tag (gtag.js) — analytics_storage defaults to 'denied' and is
         flipped to 'granted' by Silktide once the user opts in. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500
      });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QMLPKD6XBQ"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-QMLPKD6XBQ', { send_page_view: false });
    </script>
  </head>
